<!DOCTYPE html>
<html>
<head>
	<!---Metas--->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Bill Frye's Personal Website!">

	<!--- Stylesheets --->
	<link rel="stylesheet" type="text/css" href="css/style.css">

	<!--JavaScript-->
	<script type="module">
		document.addEventListener('click', (event) => {
			if (!event.target.matches('.professional,.unprofessional')) return

			document.body.classList.toggle('flip')
		})
	</script>
	<link rel='preload' href='Images/Unprofessional.webp' as='image'>

	<title>Bill Frye's Website</title>
</head>
<body>
	<main>
	<!--Top Row-->
	<div class="top-row">
		<!--Top left vertical box-->
		<div class="side-box">
		<h1 class="text-center">Bill Frye</h1>
			<div class='pfp'>
				<img class="unprofessional" src="Images/Unprofessional.webp" alt="PFP">
				<img class="professional" src="Images/Professional.png" alt="PFP">
			</div>
			<div id="mood">
				<a href="https://www.imood.com/users/bfryeofficial" width="auto" height="30px">
					<img src="https://moods.imood.com/display/uname-bfryeofficial/fg-000000/bg-FFD700/imood.gif" alt="The current mood of bfryeofficial at www.imood.com" border="2px" width="200px">
				</a>
			</div>	
		</div>

		<!--Top Right Box-->
		<div class="right-side-box">
			<ul class="mestuff">
				<li><img src="Images/Gender.png"><span>Male (he/him)</span></li>
				<li><img src="Images/Birthday.png"><span>Jan 15th</span></li>
				<li><img src="Images/Age.png"><span>24 y/o</span></li>
				<li><img src="Images/Occupation.png"><span>Admission Counselor</span></li>
				<li><img src="Images/Location.png"><span>South Carolina</span></li>
				<li><img src="Images/Personality.png"><span>Extrovert</span></li>
				<li><img src="Images/FavFood.png"><span>Overnight Oats</span></li>
			</ul>
		</div>
	</div>

	<!--Box-->
	<div class="text-box">
		<p class='text-center'>Welcome to my website! This is all of my media wrapped up in one place. :)</p>
		<br>
		<div class="image-row">
			<button class="item" command="show-modal" commandfor="about">
			  <img src="Images/Aboutme.png" alt="About Me">
			  <p>About Me</p>
			</button>
			<button class="item" command="show-modal" commandfor="links">
			  <img src="Images/Links.png" alt="Links">
			  <p>Links</p>
			</button>
			<div class="item">
			  <img src="Images/Blog.png" alt="Blog">
			  <p>Blog</p>
			</div>
			<div class="item">
			  <img src="Images/Contact.png" alt="Contact">
			  <p>Contact</p>
			</div>
		</div>
	</div>
	<dialog id="about">This is the about page!<button class='close' command='close' commandfor="about">X</button></dialog>
	<dialog id="links">This is the link page!<button class='close' command='close' commandfor="links">X</button></dialog>
	<!---Footer--->
	<footer>
		<div class="copyright">
			<p align="center">--Bill Frye 2026--</p>
		</div>
	</footer>
	</main>
</body>
